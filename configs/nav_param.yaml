bt_navigator:
  ros__parameters:
    enable_replanning: true
    replan_interval_seconds: 1.0
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /pwb/odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    cmd_vel_topic: "/pwb/cmd_vel"
    odom_topic: "/pwb/odom"
    controller_frequency: 20.0
    use_sim_time: false

    current_goal_checker: "general_goal_checker"
    current_progress_checker: "general_progress_checker"

    # Goal checker
    goal_checker_plugins: ["general_goal_checker"]
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.02
      yaw_goal_tolerance: 0.05
      stateful: True
      symmetric_yaw_tolerance: True
      xy_goal_tolerance_slowing: 0.01  

    # Progress checker
    progress_checker_plugins: ["general_progress_checker"]
    general_progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 15.0

    # Regulated Pure Pursuit Controller
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: -0.05
      min_vel_y: 0.0
      max_vel_x: 0.15
      max_vel_y: 0.0
      max_vel_theta: 1.5
      min_vel_theta: -1.5
      min_speed_xy: 0.0
      max_speed_xy: 0.2
      min_speed_theta: 0.0
      acc_lim_x: 0.05
      acc_lim_y: 0.0
      acc_lim_theta: 1.8
      decel_lim_x: -1.0
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.02
      yaw_goal_tolerance: 0.05
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics: ["PreferForward", "RotateToGoal", "Oscillation", "PathAlign", "PathDist", "GoalDist", "ObstacleFootprint"]
      PreferForward.scale: 2.0
      Oscillation.scale: 1.0
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.05
      PathDist.scale: 256.0
      GoalDist.scale: 8.0
      RotateToGoal.scale: 0.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: 1.0
      ObstacleFootprint.scale: 32.0



local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 10.0
      global_frame: pwb_odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.03
      footprint: "[[0.06, 0.11], [0.06, -0.11], [-0.06, -0.11], [-0.06, 0.11]]"
      footprint_padding: 0.01
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.3
        inflation_cost_scaling_factor: 4.0
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /pwb/lidar_scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 3.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.06, 0.11], [0.06, -0.11], [-0.06, -0.11], [-0.06, 0.11]]"
      footprint_padding: 0.01
      resolution: 0.05
      track_unknown_space: false
      width: 10
      height: 10
      origin_x: -5.0
      origin_y: -5.0
            # Список плагинов глобальной карты: два контейнера
      plugins: [
        "plugin_container_static_layer",
        "plugin_container_obstacle_layer"
      ]

      # Контейнер 1: Для статической карты (маленькая зона безопасности)
      plugin_container_static_layer:
        plugin: "nav2_costmap_2d::PluginContainerLayer"
        enabled: True
        combination_method: 1
        plugins: ["static_layer", "inflation_layer_static"] # имя для плагина инфляции
        static_layer:
          plugin: "nav2_costmap_2d::StaticLayer"
          map_subscribe_transient_local: True
          map_topic: "/map"
          enabled: True
        inflation_layer_static: # Отдельный экземпляр слоя инфляции
          plugin: "nav2_costmap_2d::InflationLayer"
          inflation_radius: 0.2          # Маленький радиус для стен
          cost_scaling_factor: 3.0      # Коэффициент снижения стоимости

      # Контейнер 2: Для препятствий с лидара (большая зона безопасности)
      plugin_container_obstacle_layer:
        plugin: "nav2_costmap_2d::PluginContainerLayer"
        enabled: True
        combination_method: 1
        plugins: ["obstacle_layer", "inflation_layer_obstacle"] # имя для другого плагина
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: True
          observation_sources: scan
          scan:
            topic: /pwb/lidar_scan
            max_obstacle_height: 2.0
            clearing: True
            marking: True
            data_type: "LaserScan"
            raytrace_max_range: 3.0
            raytrace_min_range: 0.0
            obstacle_max_range: 2.5
            obstacle_min_range: 0.0
        inflation_layer_obstacle: # Второй независимый экземпляр слоя инфляции
          plugin: "nav2_costmap_2d::InflationLayer"
          inflation_radius: 0.4          # БОЛЬШАЯ безопасная зона вокруг препятствий!
          cost_scaling_factor: 0.5      # Более резкое снижение стоимости


planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"  # или для старых версий: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5
      allow_unknown: false
      downsample_costmap: false
      downsampling_factor: 1
      allow_primitive_planning: false
      cost_travel_multiplier: 10000.0
      debug_planner: false
      use_astar: true
      smooth_path: true
      use_network: false
      checkpoint_angle: 0.0

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: pwb_odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.3
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    enabled: false
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 2.0]
    min_velocity: [-0.5, 0.0, -2.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "/pwb/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    enabled: false
    base_frame_id: "base_link"
    odom_frame_id: "pwb_odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "/pwb/cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.3
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 0.5
      simulation_time_step: 0.1
      min_points: 6
      visualize: False
      enabled: false
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/pwb/lidar_scan"
      min_height: 0.0
      max_height: 2.0
      enabled: True

docking_server:
  ros__parameters:
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "pwb_odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false
      use_stall_detection: false

      external_detection_timeout: 1.0
      external_detection_translation_x: -0.18
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: -1.57
      external_detection_rotation_pitch: -1.57
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.1

    controller:
      k_phi: 3.0
      k_delta: 2.0
      v_linear_min: 0.15
      v_linear_max: 0.15
      use_collision_detection: true
      costmap_topic: "local_costmap/costmap_raw"
      footprint_topic: "local_costmap/published_footprint"
      transform_tolerance: 0.3
      projection_time: 5.0
      simulation_step: 0.1
      dock_collision_threshold: 0.3

loopback_simulator:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "pwb_odom"
    map_frame_id: "map"
    scan_frame_id: "base_scan"
    update_duration: 0.02