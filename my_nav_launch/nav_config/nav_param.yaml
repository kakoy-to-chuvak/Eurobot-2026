bt_navigator:
  ros__parameters:
    replan_interval_seconds: 1.0
    replan_interval_seconds: 1.0
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /pwb/odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    cmd_vel_topic: "/pwb/cmd_vel"
    odom_topic: "/pwb/odom"
    controller_frequency: 20.0
    use_sim_time: false

    current_goal_checker: "general_goal_checker"
    current_progress_checker: "general_progress_checker"

    # Goal checker
    goal_checker_plugins: ["general_goal_checker"]
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.02
      yaw_goal_tolerance: 0.05
      stateful: True
      symmetric_yaw_tolerance: True
      xy_goal_tolerance_slowing: 0.01  

    # Progress checker
    progress_checker_plugins: ["general_progress_checker"]
    general_progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 15.0

    # Regulated Pure Pursuit Controller
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      
      # --- Скорости ---
      desired_linear_vel: 0.3
      max_linear_vel: 0.35
      min_linear_vel: 0.0
      max_linear_accel: 1.5

      max_angular_vel: 0.8
      min_angular_vel: -0.8
      max_angular_accel: 1.2

      # --- Поворот на месте ---
      use_rotate_to_heading: true
      rotate_to_heading_angular_vel: 0.8
      rotate_to_heading_min_angle: 0.3

      # --- Lookahead ---
      lookahead_dist: 0.1
      use_velocity_scaled_lookahead_dist: true

      # --- Коллизии и регулировка ---
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      approach_velocity_scaling_dist: 0.3
      cost_scaling_dist: 0.3
      allow_obstacle_checking_beyond_goal: true

      # --- Трансформации ---
      transform_tolerance: 0.3      

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 10.0
      global_frame: pwb_odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.03
      footprint: "[[0.06, 0.11], [0.06, -0.11], [-0.06, -0.11], [-0.06, 0.11]]"
      footprint_padding: 0.01
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 0.0
        inflation_radius: 0.4
        inflation_cost_scaling_factor: 4.0
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /pwb/lidar_scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 4.0
      publish_frequency: 4.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      track_unknown_space: false

      # Список плагинов глобальной карты: два контейнера
      plugins: [
        "plugin_container_static_layer",
        "plugin_container_obstacle_layer"
      ]

      plugin_container_static_layer:
        plugin: "nav2_costmap_2d::PluginContainerLayer"
        enabled: True
        combination_method: 1
        plugins: ["static_layer", "inflation_layer_static"]
        static_layer:
          plugin: "nav2_costmap_2d::StaticLayer"
          map_subscribe_transient_local: True
          map_topic: "/map"
          enabled: True
        inflation_layer_static:
          plugin: "nav2_costmap_2d::InflationLayer"
          inflation_radius: 0.2
          cost_scaling_factor: 1.5

      plugin_container_obstacle_layer:
        plugin: "nav2_costmap_2d::PluginContainerLayer"
        enabled: True
        combination_method: 1
        plugins: ["obstacle_layer", "inflation_layer_obstacle"]
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: True
          observation_sources: scan
          scan:
            topic: /pwb/lidar_scan
            max_obstacle_height: 2.0
            clearing: True
            marking: True
            data_type: "LaserScan"
            raytrace_max_range: 3.0
            raytrace_min_range: 0.0
            obstacle_max_range: 2.5
            obstacle_min_range: 0.0
        inflation_layer_obstacle:
          plugin: "nav2_costmap_2d::InflationLayer"
          inflation_radius: 0.4
          cost_scaling_factor: 0.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.0
      allow_unknown: false
      downsample_costmap: false
      downsampling_factor: 1
      allow_primitive_planning: true
      cost_travel_multiplier: 200.0
      smooth_path: true
      use_astar: true
      use_network: false
      checkpoint_angle: 0.0

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 0.00001
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: pwb_odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.3
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    enabled: false
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 2.0]
    min_velocity: [-0.5, 0.0, -2.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "/pwb/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    enabled: false
    base_frame_id: "base_link"
    odom_frame_id: "pwb_odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "/pwb/cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.3
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0

    polygons: ["slow_zone", "stop_zone"]
    
    slow_zone:
      type: "circle"
      action_type: "slowdown"
      radius: 0.6
      slowdown_ratio: 0.5
      min_points: 1
    
    stop_zone:
      type: "circle"
      action_type: "stop"
      radius: 0.3
      min_points: 1
      enabled: true

    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/pwb/lidar_scan"
      min_height: 0.0
      max_height: 2.0
      enabled: True

docking_server:
  ros__parameters:
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "pwb_odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false
      use_stall_detection: false

      external_detection_timeout: 1.0
      external_detection_translation_x: -0.18
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: -1.57
      external_detection_rotation_pitch: -1.57
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.1

    controller:
      k_phi: 3.0
      k_delta: 2.0
      v_linear_min: 0.15
      v_linear_max: 0.15
      use_collision_detection: true
      costmap_topic: "local_costmap/costmap_raw"
      footprint_topic: "local_costmap/published_footprint"
      transform_tolerance: 0.3
      projection_time: 5.0
      simulation_step: 0.1
      dock_collision_threshold: 0.3

loopback_simulator:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "pwb_odom"
    map_frame_id: "map"
    scan_frame_id: "base_scan"
    update_duration: 0.02